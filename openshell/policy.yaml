version: 1
filesystem_policy:
  include_workdir: true
  read_only:
  - /usr
  - /lib
  - /proc
  - /dev/urandom
  - /app
  - /etc
  - /var/log
  - /dev
  read_write:
  - /sandbox
  - /tmp
  - /dev/null
  - /dev/pts/ptmx
  - /dev/pts
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  claude_code:
    name: claude-code
    endpoints:
    - host: api.anthropic.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      access: full
    - host: statsig.anthropic.com
      port: 443
    - host: sentry.io
      port: 443
    - host: raw.githubusercontent.com
      port: 443
    - host: platform.claude.com
      port: 443
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/bin/node
  codex:
    name: codex
    endpoints:
    - host: api.openai.com
      port: 443
    - host: auth.openai.com
      port: 443
    - host: chatgpt.com
      port: 443
    binaries:
    - path: /usr/bin/codex
    - path: /usr/bin/node
    - path: /usr/lib/node_modules/@openai/**
  copilot:
    name: copilot
    endpoints:
    - host: github.com
      port: 443
    - host: api.github.com
      port: 443
    - host: api.githubcopilot.com
      port: 443
      protocol: rest
      enforcement: enforce
      access: read-write
    - host: api.individual.githubcopilot.com
      port: 443
      protocol: rest
      enforcement: enforce
      access: read-write
    - host: api.business.githubcopilot.com
      port: 443
      protocol: rest
      enforcement: enforce
      access: read-write
    - host: api.enterprise.githubcopilot.com
      port: 443
      protocol: rest
      enforcement: enforce
      access: read-write
    - host: copilot-proxy.githubusercontent.com
      port: 443
      protocol: rest
      enforcement: enforce
      access: read-write
    - host: origin-tracker.githubusercontent.com
      port: 443
    - host: telemetry.enterprise.githubcopilot.com
      port: 443
    - host: default.exp-tas.com
      port: 443
    - host: release-assets.githubusercontent.com
      port: 443
    binaries:
    - path: /usr/bin/copilot
    - path: /usr/lib/node_modules/@github/copilot/node_modules/@github/**/copilot
  cursor:
    name: cursor
    endpoints:
    - host: cursor.blob.core.windows.net
      port: 443
    - host: api2.cursor.sh
      port: 443
    - host: repo.cursor.sh
      port: 443
    - host: download.cursor.sh
      port: 443
    - host: cursor.download.prss.microsoft.com
      port: 443
    binaries:
    - path: /usr/bin/curl
    - path: /usr/bin/wget
    - path: /sandbox/.cursor-server/**
  github_rest_api:
    name: github-rest-api
    endpoints:
    - host: api.github.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      access: read-only
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/bin/gh
  github_ssh_over_https:
    name: github-ssh-over-https
    endpoints:
    - host: github.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**/info/refs*
      - allow:
          method: POST
          path: /**/git-upload-pack
    binaries:
    - path: /usr/bin/git
  nvidia_inference:
    name: nvidia-inference
    endpoints:
    - host: integrate.api.nvidia.com
      port: 443
    binaries:
    - path: /usr/bin/curl
    - path: /bin/bash
    - path: /usr/local/bin/opencode
  opencode:
    name: opencode
    endpoints:
    - host: registry.npmjs.org
      port: 443
    - host: opencode.ai
      port: 443
    - host: integrate.api.nvidia.com
      port: 443
    binaries:
    - path: /usr/lib/node_modules/opencode-ai/bin/.opencode
    - path: /usr/bin/node
    - path: /usr/local/bin/opencode
  pypi:
    name: pypi
    endpoints:
    - host: pypi.org
      port: 443
    - host: files.pythonhosted.org
      port: 443
    - host: github.com
      port: 443
    - host: objects.githubusercontent.com
      port: 443
    - host: api.github.com
      port: 443
    - host: downloads.python.org
      port: 443
    binaries:
    - path: /sandbox/.venv/bin/python
    - path: /sandbox/.venv/bin/python3
    - path: /sandbox/.venv/bin/pip
    - path: /app/.venv/bin/python
    - path: /app/.venv/bin/python3
    - path: /app/.venv/bin/pip
    - path: /usr/local/bin/uv
    - path: /sandbox/.uv/python/**
  vscode:
    name: vscode
    endpoints:
    - host: update.code.visualstudio.com
      port: 443
    - host: az764295.vo.msecnd.net
      port: 443
    - host: vscode.download.prss.microsoft.com
      port: 443
    - host: marketplace.visualstudio.com
      port: 443
    - host: gallerycdn.vsassets.io
      port: 443
    binaries:
    - path: /usr/bin/curl
    - path: /usr/bin/wget
    - path: /sandbox/.vscode-server/**
    - path: /sandbox/.vscode-remote-containers/**
