name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Format (ruff)
        run: uv run ruff format --check src/ tests/

      - name: Type check (pyright)
        run: uv run pyright

      - name: Install system dependencies
        run: sudo apt-get install -y tmux fonts-dejavu-core fontconfig

      - name: Test (pytest)
        run: uv run pytest -v
